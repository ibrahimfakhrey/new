<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تنبيه</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0f2f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 60px 50px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .icon {
      font-size: 72px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 22px;
      color: #c0392b;
      font-weight: 700;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    p {
      font-size: 15px;
      color: #666;
      line-height: 1.8;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: #c0392b;
      border-radius: 4px;
      margin: 20px auto;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚠️</div>
    <h1>يرجى تسديد كافة الرسوم المتعلقة بالموقع</h1>
    <div class="divider"></div>
    <p>هذا الموقع موقوف مؤقتاً بسبب عدم سداد الرسوم المستحقة.<br/>يرجى التواصل مع مزود الخدمة لإعادة تفعيل الموقع.</p>
  </div>
</body>
</html>
